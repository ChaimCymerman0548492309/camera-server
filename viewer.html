<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>צפייה חיה</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style> video { width: 100%; max-width: 800px; border: 2px solid green; } </style>
</head>
<body>
    <h1>צפייה בשידור חי</h1>
    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        const socket = io('https://your-server-url.onrender.com'); // אותה כתובת
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const remoteVideo = document.getElementById('remoteVideo');

        // יצירת PeerConnection כ-viewer
        function createPeer() {
            peerConnection = new RTCPeerConnection(config);

            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', event.candidate);
            };
        }

        socket.on('offer', async (offer) => {
            if (!peerConnection) createPeer();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        socket.on('candidate', async (candidate) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });
    </script>
</body>
</html>
